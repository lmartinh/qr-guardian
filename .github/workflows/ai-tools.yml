name: AI Mobile Tools

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "AI provider"
        required: true
        default: fake
        type: choice
        options:
          - fake
          - openai
          - anthropic
          - gemini
      run_compose_guardrails:
        description: "Run Compose Guardrails"
        required: true
        default: true
        type: boolean
      run_kmp_project_auditor:
        description: "Run KMP Project Auditor"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-selection:
    name: Validate Selection
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Validate tool selection
        shell: bash
        run: |
          provider="${{ inputs.provider }}"
          compose_enabled="${{ inputs.run_compose_guardrails }}"
          kmp_enabled="${{ inputs.run_kmp_project_auditor }}"

          {
            echo "## AI Mobile Tools Selection"
            echo
            echo "| Provider | \`$provider\` |"
            echo "|---|---|"
            if [[ "$compose_enabled" == "true" ]]; then
              echo "| Compose Guardrails | ✅ Yes |"
            else
              echo "| Compose Guardrails | ❌ No |"
            fi
            if [[ "$kmp_enabled" == "true" ]]; then
              echo "| KMP Project Auditor | ✅ Yes |"
            else
              echo "| KMP Project Auditor | ❌ No |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$compose_enabled" != "true" && "$kmp_enabled" != "true" ]]; then
            echo
            echo "No AI tool was selected. Enable at least one checkbox and rerun the workflow." >> "$GITHUB_STEP_SUMMARY"
            echo "At least one AI tool must be selected." >&2
            exit 1
          fi

          case "$provider" in
            fake)
              ;;
            openai)
              if [[ -z "${OPENAI_API_KEY:-}" ]]; then
                echo
                echo "OPENAI_API_KEY secret is required when provider is openai." >> "$GITHUB_STEP_SUMMARY"
                echo "Missing OPENAI_API_KEY secret for openai provider." >> "$GITHUB_STEP_SUMMARY"
                echo "OPENAI_API_KEY secret is required when provider is openai." >&2
                exit 1
              fi
              ;;
            anthropic)
              if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
                echo
                echo "ANTHROPIC_API_KEY secret is required when provider is anthropic." >> "$GITHUB_STEP_SUMMARY"
                echo "Missing ANTHROPIC_API_KEY secret for anthropic provider." >> "$GITHUB_STEP_SUMMARY"
                echo "ANTHROPIC_API_KEY secret is required when provider is anthropic." >&2
                exit 1
              fi
              ;;
            gemini)
              if [[ -z "${GEMINI_API_KEY:-}" ]]; then
                echo
                echo "GEMINI_API_KEY secret is required when provider is gemini." >> "$GITHUB_STEP_SUMMARY"
                echo "Missing GEMINI_API_KEY secret for gemini provider." >> "$GITHUB_STEP_SUMMARY"
                echo "GEMINI_API_KEY secret is required when provider is gemini." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported provider: $provider" >&2
              exit 1
              ;;
          esac

  compose-guardrails:
    name: Compose Guardrails
    needs: validate-selection
    if: ${{ inputs.run_compose_guardrails }}
    runs-on: ubuntu-latest
    env:
      MOBILE_AI_PROVIDER: ${{ inputs.provider }}
      COMPOSE_GUARDRAILS_WORKSPACE: ${{ github.workspace }}
      MOBILE_AI_TOOLKIT_DIR: ${{ github.workspace }}/mobile-ai-toolkit
      COMPOSE_GUARDRAILS_TARGET: shared/src/commonMain/kotlin/com/lmartin/qrguardian/presentation
      COMPOSE_GUARDRAILS_RULE_SET: default
      COMPOSE_GUARDRAILS_REPORT_PATH: artifacts/compose-guardrails-report.md
      COMPOSE_GUARDRAILS_CHANGED_FILES_ONLY: "false"
      COMPOSE_GUARDRAILS_FAIL_ON_FINDINGS: "false"
      COMPOSE_GUARDRAILS_REPORT_ARTIFACT: compose-guardrails-report
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout QR Guardian
        uses: actions/checkout@v6

      - name: Checkout mobile-ai-toolkit
        uses: actions/checkout@v6
        with:
          repository: lmartinh/mobile-ai-toolkit
          ref: v0.1.4
          path: mobile-ai-toolkit

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: never

      - name: Run compose-guardrails
        shell: bash
        run: |
          set +e

          case "$MOBILE_AI_PROVIDER" in
            fake)
              unset MOBILE_AI_API_KEY MOBILE_AI_MODEL
              ;;
            openai)
              export MOBILE_AI_API_KEY="${OPENAI_API_KEY:-}"
              export MOBILE_AI_MODEL="gpt-4.1-mini"
              ;;
            anthropic)
              export MOBILE_AI_API_KEY="${ANTHROPIC_API_KEY:-}"
              export MOBILE_AI_MODEL="claude-3-5-sonnet"
              ;;
            gemini)
              export MOBILE_AI_API_KEY="${GEMINI_API_KEY:-}"
              export MOBILE_AI_MODEL="gemini-1.5-pro"
              ;;
            *)
              echo "Unsupported provider: $MOBILE_AI_PROVIDER" >&2
              exit 1
              ;;
          esac

          bash .github/scripts/ci/run-compose-guardrails.sh
          compose_guardrails_status=$?
          echo "COMPOSE_GUARDRAILS_EXIT_CODE=$compose_guardrails_status" >> "$GITHUB_ENV"

      - name: Write compose guardrails summary
        if: always()
        shell: bash
        run: |
          GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" \
          COMPOSE_GUARDRAILS_WORKSPACE="$COMPOSE_GUARDRAILS_WORKSPACE" \
          COMPOSE_GUARDRAILS_REPORT_PATH="$COMPOSE_GUARDRAILS_REPORT_PATH" \
          COMPOSE_GUARDRAILS_REPORT_ARTIFACT="$COMPOSE_GUARDRAILS_REPORT_ARTIFACT" \
          MOBILE_AI_PROVIDER="$MOBILE_AI_PROVIDER" \
          bash .github/scripts/ci/write-compose-guardrails-summary.sh

      - name: Upload compose guardrails report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compose-guardrails-report
          if-no-files-found: ignore
          path: artifacts/compose-guardrails-report.md

      - name: Fail if compose-guardrails failed
        if: always()
        shell: bash
        run: |
          if [ "${COMPOSE_GUARDRAILS_EXIT_CODE:-0}" -ne 0 ]; then
            exit "$COMPOSE_GUARDRAILS_EXIT_CODE"
          fi

  kmp-project-auditor:
    name: KMP Project Auditor
    needs: validate-selection
    if: ${{ inputs.run_kmp_project_auditor }}
    runs-on: ubuntu-latest
    env:
      MOBILE_AI_PROVIDER: ${{ inputs.provider }}
      KMP_PROJECT_AUDITOR_WORKSPACE: ${{ github.workspace }}
      MOBILE_AI_TOOLKIT_DIR: ${{ github.workspace }}/mobile-ai-toolkit
      KMP_PROJECT_AUDITOR_TARGET: .
      KMP_PROJECT_AUDITOR_REPORT_PATH: artifacts/kmp-project-auditor-report.md
      KMP_PROJECT_AUDITOR_FAIL_ON_FINDINGS: "false"
      KMP_PROJECT_AUDITOR_WRITE_STEP_SUMMARY: "false"
      KMP_PROJECT_AUDITOR_REPORT_ARTIFACT: kmp-project-auditor-report
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout QR Guardian
        uses: actions/checkout@v6

      - name: Checkout mobile-ai-toolkit
        uses: actions/checkout@v6
        with:
          repository: lmartinh/mobile-ai-toolkit
          ref: v0.1.4
          path: mobile-ai-toolkit

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          add-job-summary: never

      - name: Run kmp-project-auditor
        shell: bash
        run: |
          set +e

          case "$MOBILE_AI_PROVIDER" in
            fake)
              unset MOBILE_AI_API_KEY MOBILE_AI_MODEL
              ;;
            openai)
              export MOBILE_AI_API_KEY="${OPENAI_API_KEY:-}"
              export MOBILE_AI_MODEL="gpt-4.1-mini"
              ;;
            anthropic)
              export MOBILE_AI_API_KEY="${ANTHROPIC_API_KEY:-}"
              export MOBILE_AI_MODEL="claude-3-5-sonnet"
              ;;
            gemini)
              export MOBILE_AI_API_KEY="${GEMINI_API_KEY:-}"
              export MOBILE_AI_MODEL="gemini-1.5-pro"
              ;;
            *)
              echo "Unsupported provider: $MOBILE_AI_PROVIDER" >&2
              exit 1
              ;;
          esac

          bash .github/scripts/ci/run-kmp-project-auditor.sh
          kmp_project_auditor_status=$?
          echo "KMP_PROJECT_AUDITOR_EXIT_CODE=$kmp_project_auditor_status" >> "$GITHUB_ENV"

      - name: Write kmp-project-auditor summary
        if: always()
        shell: bash
        run: |
          GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" \
          KMP_PROJECT_AUDITOR_WORKSPACE="$KMP_PROJECT_AUDITOR_WORKSPACE" \
          KMP_PROJECT_AUDITOR_REPORT_PATH="$KMP_PROJECT_AUDITOR_REPORT_PATH" \
          KMP_PROJECT_AUDITOR_REPORT_ARTIFACT="$KMP_PROJECT_AUDITOR_REPORT_ARTIFACT" \
          MOBILE_AI_PROVIDER="$MOBILE_AI_PROVIDER" \
          bash .github/scripts/ci/write-kmp-project-auditor-summary.sh

      - name: Upload kmp-project-auditor report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kmp-project-auditor-report
          if-no-files-found: error
          path: artifacts/kmp-project-auditor-report.md

      - name: Fail if kmp-project-auditor failed
        if: always()
        shell: bash
        run: |
          if [ "${KMP_PROJECT_AUDITOR_EXIT_CODE:-0}" -ne 0 ]; then
            exit "$KMP_PROJECT_AUDITOR_EXIT_CODE"
          fi
