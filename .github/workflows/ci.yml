name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  environment:
    name: Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never

      - name: Validate environment
        shell: bash
        run: |
          set +e

          java -version
          java_status=$?

          ./gradlew --version
          gradle_status=$?

          {
            echo "## Environment Summary"
            echo
            echo "| Item | Result |"
            echo "|---|---|"
            if [ "$java_status" -eq 0 ]; then
              echo "| Java 17 | ✅ OK |"
            else
              echo "| Java 17 | ❌ KO |"
            fi
            if [ "$gradle_status" -eq 0 ]; then
              echo "| Gradle wrapper | ✅ OK |"
            else
              echo "| Gradle wrapper | ❌ KO |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$java_status" -ne 0 ]; then
            exit "$java_status"
          fi

          exit "$gradle_status"

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never

      - name: Run quality checks
        shell: bash
        run: |
          set +e

          ./gradlew :androidApp:lintDebug
          lint_exit_code=$?

          if [ "$lint_exit_code" -eq 0 ]; then
            android_lint_result=ok
          else
            android_lint_result=ko
          fi

          if ./gradlew help --task spotlessCheck >/dev/null 2>&1; then
            ./gradlew spotlessCheck
            spotless_exit_code=$?
            if [ "$spotless_exit_code" -eq 0 ]; then
              spotless_result=ok
            else
              spotless_result=ko
            fi
          else
            spotless_result=skipped
          fi

          ANDROID_LINT_RESULT="$android_lint_result" \
          SPOTLESS_RESULT="$spotless_result" \
          .github/scripts/ci/write-quality-summary.sh

          if [ "$lint_exit_code" -ne 0 ]; then
            exit "$lint_exit_code"
          fi

          if [ "${spotless_exit_code:-0}" -ne 0 ]; then
            exit "$spotless_exit_code"
          fi

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never

      - name: Run shared tests
        shell: bash
        run: |
          set +e

          ./gradlew :shared:allTests
          tests_status=$?
          echo "TESTS_EXIT_CODE=$tests_status" >> "$GITHUB_ENV"

      # Coverage is reported as best-effort: missing Kover XML should not fail CI.
      - name: Generate Kover XML report
        shell: bash
        run: |
          set +e

          ./gradlew :shared:koverXmlReport

      - name: Write tests summary
        if: always()
        shell: bash
        run: |
          TESTS_EXIT_CODE="${TESTS_EXIT_CODE:-0}" \
          GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" \
          python3 .github/scripts/ci/write-test-summary.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          if-no-files-found: ignore
          path: |
            shared/build/test-results
            shared/build/reports/tests

      - name: Upload Kover report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          if-no-files-found: ignore
          path: |
            shared/build/reports/kover

      - name: Fail if tests failed
        if: always()
        shell: bash
        run: |
          if [ "${TESTS_EXIT_CODE:-0}" -ne 0 ]; then
            exit "$TESTS_EXIT_CODE"
          fi

  assemble-release:
    name: Assemble Release
    runs-on: ubuntu-latest
    needs:
      - quality
      - tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never

      - name: Run assembleRelease
        shell: bash
        run: |
          set +e

          ./gradlew :androidApp:assembleRelease
          assemble_status=$?
          echo "ASSEMBLE_EXIT_CODE=$assemble_status" >> "$GITHUB_ENV"

      - name: Write assemble summary
        if: always()
        shell: bash
        run: |
          ASSEMBLE_EXIT_CODE="${ASSEMBLE_EXIT_CODE:-0}" \
          GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" \
          bash .github/scripts/ci/write-assemble-summary.sh

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          if-no-files-found: ignore
          path: |
            androidApp/build/outputs/apk/release
            androidApp/build/outputs/bundle/release

      - name: Fail if assemble failed
        if: always()
        shell: bash
        run: |
          if [ "${ASSEMBLE_EXIT_CODE:-0}" -ne 0 ]; then
            exit "$ASSEMBLE_EXIT_CODE"
          fi

  compose-guardrails:
    name: Compose Guardrails
    runs-on: ubuntu-latest
    needs: environment
    env:
      MOBILE_AI_PROVIDER: fake
      COMPOSE_GUARDRAILS_WORKSPACE: ${{ github.workspace }}
      MOBILE_AI_TOOLKIT_DIR: ${{ github.workspace }}/mobile-ai-toolkit
      # Scope the analysis to shared Compose/KMP sources to avoid build-cache noise.
      COMPOSE_GUARDRAILS_TARGET: shared/src
      COMPOSE_GUARDRAILS_RULE_SET: default
      COMPOSE_GUARDRAILS_REPORT_PATH: artifacts/compose-guardrails-report.md
      COMPOSE_GUARDRAILS_CHANGED_FILES_ONLY: "false"
      COMPOSE_GUARDRAILS_FAIL_ON_FINDINGS: "false"
      COMPOSE_GUARDRAILS_REPORT_ARTIFACT: compose-guardrails-report
    steps:
      - name: Checkout QR Guardian
        uses: actions/checkout@v4

      - name: Checkout mobile-ai-toolkit
        uses: actions/checkout@v4
        with:
          repository: lmartinh/mobile-ai-toolkit
          path: mobile-ai-toolkit

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never

      - name: Run compose-guardrails
        shell: bash
        run: |
          set +e

          bash .github/scripts/ci/run-compose-guardrails.sh
          compose_guardrails_status=$?
          echo "COMPOSE_GUARDRAILS_EXIT_CODE=$compose_guardrails_status" >> "$GITHUB_ENV"

      - name: Write compose guardrails summary
        if: always()
        shell: bash
        run: |
          GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" \
          COMPOSE_GUARDRAILS_WORKSPACE="$COMPOSE_GUARDRAILS_WORKSPACE" \
          COMPOSE_GUARDRAILS_REPORT_PATH="$COMPOSE_GUARDRAILS_REPORT_PATH" \
          COMPOSE_GUARDRAILS_REPORT_ARTIFACT="$COMPOSE_GUARDRAILS_REPORT_ARTIFACT" \
          MOBILE_AI_PROVIDER="$MOBILE_AI_PROVIDER" \
          bash .github/scripts/ci/write-compose-guardrails-summary.sh

      - name: Upload compose guardrails report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-guardrails-report
          if-no-files-found: ignore
          path: artifacts/compose-guardrails-report.md

      - name: Fail if compose-guardrails failed
        if: always()
        shell: bash
        run: |
          if [ "${COMPOSE_GUARDRAILS_EXIT_CODE:-0}" -ne 0 ]; then
            exit "$COMPOSE_GUARDRAILS_EXIT_CODE"
          fi
